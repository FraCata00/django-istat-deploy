name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:   # permette trigger manuale dalla UI GitHub

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build Docker image (opzionale: utile per smoke-test locale) ────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (cache check)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false          # solo build, non push su registry
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: istat-api:ci

      # ── Trigger deploy su Render via Deploy Hook ───────────────────────────
      # Aggiungi RENDER_DEPLOY_HOOK_URL come Secret nel repo GitHub:
      #   Settings → Secrets → Actions → New repository secret
      - name: Trigger Render deploy
        run: |
          curl -fsSL --retry 3 \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        # Il deploy hook è disponibile in Render:
        #   Service → Settings → Deploy Hook → copy URL

[tool.ruff]
target-version = "py311"
line-length = 119

[tool.ruff.lint]
select = [
    "E",
    "W",  # pycodestyle
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "DJ", # flake8-django
    "UP", # pyupgrade
]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["config", "istat_api"]

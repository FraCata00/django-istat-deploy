services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: istat
      POSTGRES_USER: istat
      POSTGRES_PASSWORD: istat
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U istat"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DJANGO_SECRET_KEY: "dev-secret-change-me-in-production"
      DJANGO_DEBUG: "true"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: "postgres://istat:istat@db:5432/istat"
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  pgdata:
